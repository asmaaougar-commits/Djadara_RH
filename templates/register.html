{% extends "base_public.html" %}

{% block title %}Créer un compte - Yassir RH{% endblock %}

{% block head %}
<style>
    .login-outer {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 10% 20%, rgb(255, 200, 212) 0%, rgb(255, 240, 243) 90.1%);
        padding: 20px;
    }
    .login-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 450px;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
    .form-control { width: 100%; padding: 12px 14px; border: 1.5px solid #E2E8F0; border-radius: 12px; outline: none; }
    .btn-primary { width: 100%; background: #FF3366; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="login-outer">
    <div class="login-card">
        <h1 style="font-size: 26px; margin-bottom: 5px;">Inscription</h1>
        <p style="color: #64748B; margin-bottom: 25px;">Créez votre profil recruteur</p>

        <form action="{{ url_for('register') }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="nom">Nom complet *</label>
                <input type="text" id="nom" name="nom" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="entreprise">Entreprise / Organisation</label>
                <input type="text" id="entreprise" name="entreprise" class="form-control">
            </div>
            <div class="form-group">
                <label for="email">Adresse email *</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="avatar">Photo de profil (Avatar)</label>
                <input type="file" id="avatar" name="avatar" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;">S'inscrire</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #64748B;">
            Déjà inscrit ? <a href="{{ url_for('login') }}" style="color: #FF3366; text-decoration: none; font-weight: 600;">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
