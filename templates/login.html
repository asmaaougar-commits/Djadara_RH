{% extends "base_public.html" %}

{% block title %}Se connecter à Yassir RH{% endblock %}

{% block head %}
<style>
    .login-outer {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 10% 20%, rgb(255, 200, 212) 0%, rgb(255, 240, 243) 90.1%);
        padding: 20px;
    }
    .login-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 450px;
    }
    .login-header h1 { font-size: 28px; font-weight: 700; color: #0F172A; margin-bottom: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
    .form-control { width: 100%; padding: 14px 16px; border: 1.5px solid #E2E8F0; border-radius: 12px; outline: none; font-size: 15px; }
    .form-control:focus { border-color: #FF3366; }
    .btn-primary { width: 100%; background: #FF3366; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #E02253; }
</style>
{% endblock %}

{% block content %}
<div class="login-outer">
    <div class="login-card">
        <div class="login-header">
            <h1>Connexion</h1>
            <p style="color: #64748B; margin-bottom: 30px;">Accédez à votre espace Recruteur</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="exemple@yassir.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <p style="text-align: center; margin-top: 25px; font-size: 14px; color: #64748B;">
            Pas encore de compte ? <a href="{{ url_for('register') }}" style="color: #FF3366; text-decoration: none; font-weight: 600;">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
